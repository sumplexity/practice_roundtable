<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Practice Roundtable &middot; QR</title>
  <meta name="theme-color" content="#F7F2E9">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Public+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F2E9;
      --ink: #1A1A1F;
      --muted: #6B635A;
      --accent: #0A4D1C;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      background:
        radial-gradient(circle at top right, rgba(10, 77, 28, 0.08), transparent 30%),
        var(--bg);
      color: var(--ink);
      font-family: 'Public Sans', sans-serif;
      text-align: center;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Newsreader', serif;
      font-weight: 400;
      font-size: clamp(32px, 8vw, 52px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

    .tagline {
      font-family: 'Newsreader', serif;
      font-size: clamp(18px, 4.5vw, 28px);
      line-height: 1.4;
      color: var(--muted);
      max-width: 28ch;
      margin-bottom: 40px;
    }

    .tagline em {
      font-style: italic;
      color: var(--accent);
    }

    .qr-wrap {
      padding: 16px;
      background: white;
      border: 1px solid rgba(26, 26, 31, 0.08);
      box-shadow: 0 8px 28px rgba(52, 43, 28, 0.06);
      width: fit-content;
      margin: 0 auto 40px;
    }

    .qr-wrap img {
      display: block;
      width: min(72vw, 340px);
      height: auto;
    }

    .url {
      font-size: clamp(16px, 3.5vw, 22px);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <span class="dot" aria-hidden="true"></span>
  <h1>The Practice Roundtable</h1>
  <p class="tagline">Where senior aesthetic practitioners think aloud <em>together</em>.</p>

  <div class="qr-wrap">
    <img src="practice-roundtable-qr.svg" alt="QR code for www.practiceroundtable.co.uk">
  </div>

  <div class="url">www.practiceroundtable.co.uk</div>
</body>
</html>
