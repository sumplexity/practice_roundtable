      font-size: clamp(18px, 4.5vw, 28px);
      line-height: 1.4;
      color: var(--muted);
      max-width: 28ch;
      margin-bottom: 40px;
    }

    .tagline em {
      font-style: italic;
      color: var(--accent);
    }

    .qr-wrap {
      padding: 16px;
      background: white;
      border: 1px solid rgba(26, 26, 31, 0.08);
      box-shadow: 0 8px 28px rgba(52, 43, 28, 0.06);

      margin: 0 auto 40px;

      display: block;
      width: min(72vw, 340px);

      font-size: clamp(16px, 3.5vw, 22px);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink);
    }
